<!DOCTYPE html>
<html>
<head>
<title>Billet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
<div class="card shadow mx-auto" style="max-width:600px;">

<div class="card-body text-center">

<h1 class="text-primary">🎫 Billet Event</h1>
<hr>

<h3>{{ billet.inscription.evenement.titre }}</h3>

<p><strong>Participant :</strong> {{ billet.inscription.utilisateur.username }}</p>

<p><strong>Lieu :</strong> {{ billet.inscription.evenement.lieu }}</p>

<p><strong>Date :</strong> {{ billet.inscription.evenement.date }}</p>

<p><strong>Heure :</strong> {{ billet.inscription.evenement.heure }}</p>

<p><strong>Code :</strong></p>

<h2 class="text-success">{{ billet.code }}</h2>

<button onclick="window.print()" class="btn btn-primary mt-3">
Imprimer / Télécharger PDF
</button>

</div>
</div>
</div>

</body>
</html>
